services:
  # ── HTTP Backend ─────────────────────────────────────────────────────────────
  http-backend:
    build:
      context: .
      dockerfile: Docker/Dockerfile.backend
    container_name: drawlify-http
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── WebSocket Backend ─────────────────────────────────────────────────────────
  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
    container_name: drawlify-ws
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      http-backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const ws = new (require('ws'))('ws://localhost:8080'); ws.on('open', () => { ws.close(); process.exit(0); }); ws.on('error', () => process.exit(1));\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_HTTP_BACKEND: ${NEXT_PUBLIC_HTTP_BACKEND:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    container_name: drawlify-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_HTTP_BACKEND: ${NEXT_PUBLIC_HTTP_BACKEND:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    depends_on:
      - http-backend
      - ws-backend
