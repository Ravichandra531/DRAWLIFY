services:
  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
    container_name: drawlify-http
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production

  ws-backend:
    build:
      context: .
      dockerfile: apps/ws-backend/Dockerfile
    container_name: drawlify-ws
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      - http-backend

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_HTTP_BACKEND: ${NEXT_PUBLIC_HTTP_BACKEND:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    container_name: drawlify-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - http-backend
      - ws-backend
